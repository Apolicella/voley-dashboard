}

function switchSkillTab(btn, pid, skill) {
  const parent = btn.closest('.player-accordion-body');
  parent.querySelectorAll('.skill-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const atkPanel = document.getElementById('panel-atk-' + pid);
  const srvPanel = document.getElementById('panel-srv-' + pid);
  if (atkPanel) atkPanel.style.display = skill === 'atk' ? '' : 'none';
  if (srvPanel) srvPanel.style.display = skill === 'srv' ? '' : 'none';
}

function renderArrowCourt(combo, attacks, playerColor) {
  const W=184, H=160;
  const cw=W/3, rh=H/3;
  const offset=16;

  const destCount={}, destPts={};
  const destPlays={}; // zona destino → lista de jugadas (para el reproductor)
  let srcZone=null;
  for (const a of attacks) {
    if (!a.atk_from||!a.atk_to) continue;
    srcZone=a.atk_from;
    destCount[a.atk_to]=(destCount[a.atk_to]||0)+1;
    if (a.attack_result==='#') destPts[a.atk_to]=(destPts[a.atk_to]||0)+1;
    if (!destPlays[a.atk_to]) destPlays[a.atk_to]=[];
    destPlays[a.atk_to].push(a);
  }
  const maxC=Math.max(...Object.values(destCount),1);
  const totalH=H+8;

  let o=`<svg width="${W}" height="${totalH}" viewBox="0 0 ${W} ${totalH}" xmlns="http://www.w3.org/2000/svg">`;

  // Franja superior (zona del atacante)
  o+=`<rect x="0" y="0" width="${W}" height="${offset}" fill="#0d1117"/>`;
  o+=`<line x1="0" y1="${offset-1}" x2="${W}" y2="${offset-1}" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>`;

  // Fondo base de la cancha — completamente transparente
  o+=`<rect x="0" y="${offset}" width="${W}" height="${H-offset}" fill="transparent"/>`;

  // Celdas: translúcidas, más opacas cuanto más ataques
  for (const [zone, pos] of Object.entries(DEST_ZONE_POS)) {
    const x=pos.col*cw, y=offset+pos.row*rh;
    const cnt=destCount[zone]||0;
    const ratio=cnt/maxC;
    // Sin ataques: casi invisible. Con ataques: va de tenue a sólido
    const fillOp = cnt===0 ? 0.04 : 0.12 + ratio*0.72;
    o+=`<rect x="${x+1}" y="${y+1}" width="${cw-2}" height="${rh-2}"
      fill="#e0e8ff" opacity="${fillOp.toFixed(2)}" rx="2"/>`;
  }

  // Líneas de la cancha (encima de las celdas)
  o+=`<line x1="${cw}" y1="${offset}" x2="${cw}" y2="${H}" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>`;
  o+=`<line x1="${cw*2}" y1="${offset}" x2="${cw*2}" y2="${H}" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>`;
  o+=`<line x1="0" y1="${offset+rh}" x2="${W}" y2="${offset+rh}" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>`;
  o+=`<line x1="0" y1="${offset+rh*2}" x2="${W}" y2="${offset+rh*2}" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>`;
  o+=`<rect x="0" y="${offset}" width="${W}" height="${H-offset}" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>`;
  o+=`<line x1="0" y1="${H*0.67}" x2="${W}" y2="${H*0.67}" stroke="rgba(255,255,255,0.12)" stroke-width="0.8" stroke-dasharray="3 2"/>`;

  // Red
  o+=`<rect x="0" y="${H}" width="${W}" height="8" fill="#1a1a2e"/>`;
  o+=`<line x1="0" y1="${H+4}" x2="${W}" y2="${H+4}" stroke="#f85149" stroke-width="3"/>`;

  // Origen
  const ZONE_OX={'4':5/6,'3':1/2,'2':1/6,'8':1/2,'9':1/6};
  const originX=W*(ZONE_OX[srcZone]??0.5);
  const originY=8;

  // Flechas
  for (const [dz,cnt] of Object.entries(destCount)) {
    const pos=DEST_ZONE_POS[dz]; if(!pos) continue;
    const pts=destPts[dz]||0;
    const ratio=cnt/maxC;
    const tx=pos.col*cw+cw/2, ty=offset+pos.row*rh+rh/2;
    const ac='#ffffff';
    const sw=Math.max(1.5,ratio*3.5);
    const op=Math.max(0.5,ratio*0.9+0.1);
    const mid=`a${dz}${Math.random().toString(36).slice(2,5)}`;
    o+=`<defs><marker id="${mid}" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L0,5 L5,2.5 z" fill="${ac}" opacity="${op}"/></marker></defs>`;
    o+=`<line x1="${originX}" y1="${originY+6}" x2="${tx}" y2="${ty-rh*0.3}" stroke="${ac}" stroke-width="${sw}" opacity="${op}" marker-end="url(#${mid})"/>`;
    // Badge con número — más grande — clickeable si hay video cargado
    const lbl=pts>0?`${cnt}(${pts})`:`${cnt}`;
    const bw=lbl.length*7+12;
    const playsId = registerPlays(destPlays[dz] || []);
    const badgeClick = `onclick="openPlayList('${playsId}')" style="cursor:pointer"`;
    o+=`<rect x="${tx-bw/2}" y="${ty-11}" width="${bw}" height="20" rx="3" fill="${ac}" opacity="${Math.min(op+0.2,1)}" ${badgeClick}/>`;
    o+=`<text x="${tx}" y="${ty+5}" text-anchor="middle" pointer-events="none" font-family="'Barlow Condensed',sans-serif" font-size="13" font-weight="900" fill="#000">${lbl}</text>`;
  }

  // Números de zona
  for (const [zone,pos] of Object.entries(DEST_ZONE_POS)) {
    o+=`<text x="${pos.col*cw+3}" y="${offset+pos.row*rh+11}" font-family="'Barlow Condensed',sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.4)">${zone}</text>`;
  }

  // Círculo origen
  o+=`<circle cx="${originX}" cy="${originY}" r="6" fill="${playerColor}" opacity="0.95" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>`;
  o+=`<text x="${originX}" y="${originY+4}" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-size="7" font-weight="900" fill="#000">Z${srcZone||'?'}</text>`;

  o+=`</svg>`;
  return o;
}

function renderServeCourt(serves, playerColor) {
  // Cancha del saque: origen siempre 1, 5 o 6 (zaguero), destino zona 1-9 de la cancha rival
  const W=184, H=160;
  const cw=W/3, rh=H/3;
  const offset=16;

  const destCount={}, destAces={};
  const destPlays={};
  let srcZone=null;
  for (const s of serves) {
    if (!s.srv_from) continue;
    srcZone = s.srv_from;
    if (s.srv_to) {
      destCount[s.srv_to]=(destCount[s.srv_to]||0)+1;
      if (s.result==='#') destAces[s.srv_to]=(destAces[s.srv_to]||0)+1;
      if (!destPlays[s.srv_to]) destPlays[s.srv_to]=[];
      destPlays[s.srv_to].push(s);
    }
  }
  const maxC=Math.max(...Object.values(destCount),1);
  const totalH=H+8;

  let o=`<svg width="${W}" height="${totalH}" viewBox="0 0 ${W} ${totalH}" xmlns="http://www.w3.org/2000/svg">`;

  // Franja superior (posición de saque)
  o+=`<rect x="0" y="0" width="${W}" height="${offset}" fill="#0d1117"/>`;
  o+=`<line x1="0" y1="${offset-1}" x2="${W}" y2="${offset-1}" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>`;

  // Fondo cancha — translúcido igual que ataque
  o+=`<rect x="0" y="${offset}" width="${W}" height="${H-offset}" fill="transparent"/>`;

  for (const [zone, pos] of Object.entries(DEST_ZONE_POS)) {
    const x=pos.col*cw, y=offset+pos.row*rh;
    const cnt=destCount[zone]||0;
    const ratio=cnt/maxC;
    const fillOp = cnt===0 ? 0.04 : 0.12 + ratio*0.72;
    o+=`<rect x="${x+1}" y="${y+1}" width="${cw-2}" height="${rh-2}" fill="#e0e8ff" opacity="${fillOp.toFixed(2)}" rx="2"/>`;
  }

  // Líneas de la cancha
  o+=`<line x1="${cw}" y1="${offset}" x2="${cw}" y2="${H}" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>`;
  o+=`<line x1="${cw*2}" y1="${offset}" x2="${cw*2}" y2="${H}" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>`;
  o+=`<line x1="0" y1="${offset+rh}" x2="${W}" y2="${offset+rh}" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>`;
  o+=`<line x1="0" y1="${offset+rh*2}" x2="${W}" y2="${offset+rh*2}" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>`;
  o+=`<rect x="0" y="${offset}" width="${W}" height="${H-offset}" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>`;
  o+=`<line x1="0" y1="${H*0.67}" x2="${W}" y2="${H*0.67}" stroke="rgba(255,255,255,0.12)" stroke-width="0.8" stroke-dasharray="3 2"/>`;

  // Red
  o+=`<rect x="0" y="${H}" width="${W}" height="8" fill="#1a1a2e"/>`;
  o+=`<line x1="0" y1="${H+4}" x2="${W}" y2="${H+4}" stroke="#f85149" stroke-width="3"/>`;

  // Posición de origen del saque: 1=derecha, 6=centro, 5=izquierda
  const SRV_OX = {'1':1/6, '6':1/2, '5':5/6};
  const originX = W*(SRV_OX[srcZone]??0.5);
  const originY = 8;

  // Flechas hacia cada zona destino
  for (const [dz,cnt] of Object.entries(destCount)) {
    const pos=DEST_ZONE_POS[dz]; if(!pos) continue;
    const aces=destAces[dz]||0;
    const ratio=cnt/maxC;
    const tx=pos.col*cw+cw/2, ty=offset+pos.row*rh+rh/2;
    const ac='#ffffff';
    const sw=Math.max(1.5,ratio*3.5);
    const op=Math.max(0.5,ratio*0.9+0.1);
    const mid=`s${dz}${Math.random().toString(36).slice(2,5)}`;
    o+=`<defs><marker id="${mid}" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L0,5 L5,2.5 z" fill="${ac}" opacity="${op}"/></marker></defs>`;
    o+=`<line x1="${originX}" y1="${originY+6}" x2="${tx}" y2="${ty-rh*0.3}" stroke="${ac}" stroke-width="${sw}" opacity="${op}" marker-end="url(#${mid})"/>`;
    const lbl=aces>0?`${cnt}(${aces})`:`${cnt}`;
    const bw=lbl.length*7+12;
    const playsId = registerPlays(destPlays[dz] || []);
    const badgeClick = `onclick="openPlayList('${playsId}')" style="cursor:pointer"`;
    o+=`<rect x="${tx-bw/2}" y="${ty-11}" width="${bw}" height="20" rx="3" fill="${ac}" opacity="${Math.min(op+0.2,1)}" ${badgeClick}/>`;
    o+=`<text x="${tx}" y="${ty+5}" text-anchor="middle" pointer-events="none" font-family="'Barlow Condensed',sans-serif" font-size="13" font-weight="900" fill="#000">${lbl}</text>`;
  }

  // Números de zona
  for (const [zone,pos] of Object.entries(DEST_ZONE_POS)) {
    o+=`<text x="${pos.col*cw+3}" y="${offset+pos.row*rh+11}" font-family="'Barlow Condensed',sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.4)">${zone}</text>`;
  }

  // Círculo origen con zona de saque (1, 5 o 6)
  o+=`<circle cx="${originX}" cy="${originY}" r="6" fill="${playerColor}" opacity="0.95" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>`;
  o+=`<text x="${originX}" y="${originY+4}" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-size="7" font-weight="900" fill="#000">Z${srcZone||'?'}</text>`;

  o+=`</svg>`;
  return o;
}

function openZonePopup(rot, zone) {
  const merged = mergeForTeam(state.files.map(f => f.data), state.activeTeam);
  if (!merged) return;

  const dist    = merged.setter_distribution;
  const details = dist.details;
  const players = merged.players || {};

  // Filtrar los ataques de esta rotación (y zona si se especifica) según el filtro activo
  const filtered = details.filter(d =>
    d.rotation == rot &&
    (zone === null || d.zone === zone) &&
    (state.filter === 'all' || d.in_condition)
  );

  if (filtered.length === 0) return;

  // Agrupar por jugador (y por zona si estamos viendo todas las zonas)
  const byPlayer = {};
  for (const d of filtered) {
    const pid = d.player;
    if (!byPlayer[pid]) byPlayer[pid] = { count: 0, results: {}, byZone: {} };
    byPlayer[pid].count++;
    byPlayer[pid].results[d.attack_result] = (byPlayer[pid].results[d.attack_result] || 0) + 1;
    byPlayer[pid].byZone[d.zone] = (byPlayer[pid].byZone[d.zone] || 0) + 1;
  }

  // Resolver nombre del jugador
  const teamSide = state.activeTeam;
  function getPlayerName(num) {
    const numPad = num.padStart(2,'0');
    const p = players['P_' + numPad]
           || players['H_' + numPad] || players['V_' + numPad];
    if (p) return `#${p.number} ${p.last_name}`;
    return `#${num}`;
  }

  const EVAL_SYM = { '#':'●','+':`✚`,'!':'○','-':'✖','=':'✗','/':'∅' };
  const EVAL_COL = { '#':'#3fb950','+':'#a0d080','!':'#8b949e','-':'#f0883e','=':'#f85149','/':'#8b949e' };
  const color    = zone !== null ? ZONE_COLORS[zone] : '#f0b429';
  const zoneName = zone !== null ? `Zona ${zone}` : 'Todas las zonas';
  const filterLabel = state.filter === 'quality' ? 'Recepción # y +' : 'Todas las recepciones';

  // Ordenar por cantidad desc
  const sorted = Object.entries(byPlayer).sort((a,b) => b[1].count - a[1].count);

  const rows = sorted.map(([pid, info]) => {
    const name = getPlayerName(pid);
    const eff  = Math.round(((info.results['#']||0)+(info.results['+'||0])) / info.count * 100);
    const resDots = Object.entries(info.results)
      .map(([ev, cnt]) => `<span style="color:${EVAL_COL[ev]}">${EVAL_SYM[ev]}${cnt}</span>`)
      .join(' ');
    const zoneBreakdown = zone === null
      ? `<div class="popup-player-zonebreak">${Object.entries(info.byZone).sort((a,b)=>b[1]-a[1])
          .map(([z,n]) => `<span style="color:${ZONE_COLORS[z]||'#8b949e'}">Z${z}:${n}</span>`).join(' ')}</div>`
      : '';
    const playsId = registerPlays(filtered.filter(d => d.player === pid));
    return `
      <div class="popup-player-row">
        <div class="popup-player-name">${name}${zoneBreakdown}</div>
        <div class="popup-player-count" style="color:${color}">${info.count}</div>
        <div class="popup-player-results">${resDots}</div>
        <button class="popup-player-video-btn" onclick="openPlayList('${playsId}')" title="Ver jugadas en video">▶</button>
      </div>`;
  }).join('');

  document.getElementById('zone-popup-title').textContent   = `${zoneName} · Rot. ${rot}`;
  document.getElementById('zone-popup-filter').textContent  = filterLabel;
  document.getElementById('zone-popup-total').textContent   = `${filtered.length} ataque${filtered.length!==1?'s':''}`;
  document.getElementById('zone-popup-color').style.background = color;
  document.getElementById('zone-popup-rows').innerHTML      = rows;
  document.getElementById('zone-popup-overlay').style.display = 'flex';
}

function closeZonePopup() {
  document.getElementById('zone-popup-overlay').style.display = 'none';
}

  </div>
</div>

<!-- MODAL LISTA DE JUGADAS -->
<div class="popup-overlay" id="playlist-modal-overlay" onclick="if(event.target===this)closePlaylistModal()">
  <div class="popup-box" style="width:420px">
    <div class="popup-header">
      <span class="popup-title" id="playlist-modal-title"></span>
      <button class="popup-close" onclick="closePlaylistModal()">✕ Cerrar</button>
    </div>
    <div class="popup-body" id="playlist-modal-body"></div>
  </div>
</div>

<!-- REPRODUCTOR DE VIDEO FLOTANTE -->
<div id="video-player-wrap" class="video-player-wrap" style="display:none">
  <div class="video-player-header">
    <div class="video-player-header-text">
      <span>🎬 <span id="video-current-desc">Reproduciendo jugada</span></span>
      <span id="video-nav-label" style="color:var(--accent)"></span>
    </div>
    <div style="display:flex;gap:8px">
      <button class="video-player-btn" onclick="navPlay(-1)" title="Jugada anterior">◀ Anterior</button>
      <button class="video-player-btn" onclick="toggleInlinePlaylist()" title="Ver todas las jugadas de esta selección">☰ Lista</button>
      <button class="video-player-btn" onclick="replayCurrentClip()" title="Repetir desde 5s antes">↺ Repetir</button>
      <button class="video-player-btn" onclick="navPlay(1)" title="Jugada siguiente">Siguiente ▶</button>
      <button class="video-player-btn" onclick="toggleVideoFullscreen()" title="Pantalla completa (con controles)">⛶ Ampliar</button>
      <button class="video-player-btn" onclick="document.getElementById('video-player-wrap').style.display='none';stopVideoClip()">✕ Cerrar</button>
    </div>
  </div>
  <div id="video-inline-playlist" class="video-inline-playlist" style="display:none"></div>
  <video id="video-player" class="video-player" controls controlsList="nofullscreen"></video>
</div>

</body>
</html>
