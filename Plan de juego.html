<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análisis / Plan de Juego</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap');

  :root {
    --bg:        #0d1117;
    --bg2:       #161b22;
    --bg3:       #21262d;
    --border:    #30363d;
    --accent:    #f0b429;
    --accent2:   #e25822;
    --text:      #e6edf3;
    --text-dim:  #8b949e;
    --green:     #3fb950;
    --red:       #f85149;
    --blue:      #58a6ff;
    --purple:    #bc8cff;
    --orange:    #f0883e;

    /* zonas */
    --z2:  #58a6ff;
    --z3:  #bc8cff;
    --z4:  #f0b429;
    --z8:  #3fb950;
    --z9:  #f85149;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────────────── */
  header {
    background: var(--bg2);
    border-bottom: 2px solid var(--accent);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    print-color-adjust: exact;
  }
  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .header-meta {
    display: flex;
    gap: 8px;
    margin-left: auto;
    align-items: center;
  }
  .team-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 3px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all .15s;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    background: transparent;
  }
  .team-badge.active {
    background: transparent;
    color: var(--accent);
    border-color: var(--accent);
  }
  .team-badge:not(.active):hover {
    border-color: var(--text-dim);
    color: var(--text);
  }

  /* ── TOOLBAR ─────────────────────────────────────────── */
  .toolbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .toolbar label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .8px;
  }
  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 7px 16px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  .btn.primary:hover { background: #d9a020; }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: var(--red); color: #fff; }

  #file-input { display: none; }

  .filter-toggle {
    display: flex;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
  }
  .filter-toggle button {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 14px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .15s;
  }
  .filter-toggle button.active {
    background: var(--accent);
    color: #000;
  }

  .files-list {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .file-chip {
    font-size: 11px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 3px 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .file-chip .rm { cursor: pointer; color: var(--red); font-size: 13px; }

  /* ── MAIN ────────────────────────────────────────────── */
  main {
    padding: 24px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
    color: var(--text-dim);
    text-align: center;
  }
  .empty-state .icon { font-size: 64px; opacity: .3; }
  .empty-state h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
  }
  .empty-state p { font-size: 15px; color: var(--text-dim); }

  /* ── SUMMARY BAR ─────────────────────────────────────── */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
  }
  .stat-card .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .stat-card .value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
  }
  .stat-card .sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* ── ROTACIONES GRID ─────────────────────────────────── */
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .rotations-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 36px;
  }

  /* ── ROTATION CARD ───────────────────────────────────── */
  .rot-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .rot-card:hover { border-color: var(--accent); }

  .rot-header {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .rot-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: color .15s;
  }
  .rot-title:hover { color: var(--accent); }
  .rot-count {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: var(--text-dim);
  }

  .rot-body { padding: 16px; }

  /* Cancha SVG */
  .court-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
  }
  .court-svg { width: 100%; max-width: 260px; }

  /* Video link */
  .video-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .video-link-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 10px;
    color: var(--text);
    font-size: 12px;
    font-family: 'Barlow', sans-serif;
    outline: none;
    transition: border-color .15s;
  }
  .video-link-input:focus { border-color: var(--accent); }
  .video-link-input::placeholder { color: var(--text-dim); }
  .video-btn {
    font-size: 16px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    padding: 4px 6px;
    border-radius: 4px;
    transition: color .15s;
    text-decoration: none;
  }
  .video-btn:hover { color: var(--accent); }
  .video-attach-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .5px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 10px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .video-attach-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Barra de zonas bajo la cancha */
  .zone-bars {
    display: flex;
    gap: 4px;
    margin-top: 10px;
  }
  .zone-bar-item {
    flex: 1;
    text-align: center;
  }
  .zone-bar-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .5px;
    margin-bottom: 3px;
  }
  .zone-bar-fill {
    height: 5px;
    border-radius: 2px;
    transition: width .3s;
  }
  .zone-bar-pct {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* Leyenda de efectividad */
  .eff-legend {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .eff-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--text-dim);
  }
  .eff-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  /* ── POPUP ZONA ──────────────────────────────────────── */
  .popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .popup-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 360px;
    max-width: 95vw;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  }
  .popup-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .popup-color-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .popup-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    flex: 1;
  }
  .popup-meta {
    display: flex;
    justify-content: space-between;
    padding: 8px 20px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .6px;
  }
  .popup-body {
    padding: 12px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 340px;
    overflow-y: auto;
  }
  .popup-player-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 12px;
    align-items: center;
    padding: 8px 12px;
    background: var(--bg3);
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .popup-player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .5px;
  }
  .popup-player-count {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    line-height: 1;
  }
  .popup-player-results {
    display: flex;
    gap: 5px;
    font-size: 12px;
    font-weight: 600;
  }
  .popup-player-video-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 9px;
    cursor: pointer;
    transition: opacity .15s;
  }
  .popup-player-video-btn:hover { opacity: .8; }
  .popup-player-zonebreak {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    font-weight: 600;
  }
  .popup-close {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-dim);
    padding: 4px 12px;
    cursor: pointer;
    transition: all .15s;
  }
  .popup-close:hover { border-color: var(--red); color: var(--red); }

  /* ── LISTA DE JUGADAS (playlist) ──────────────────────── */
  .playlist-item {
    display: grid;
    grid-template-columns: 24px 1fr auto 24px;
    gap: 10px;
    align-items: center;
    padding: 9px 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all .15s;
  }
  .playlist-item:hover { border-color: var(--accent); background: #1a2030; }
  .playlist-item-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    color: var(--accent);
    font-size: 14px;
    text-align: center;
  }
  .playlist-item-desc {
    font-size: 12px;
    color: var(--text);
  }
  .playlist-item-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    color: var(--text-dim);
  }
  .playlist-item-play {
    color: var(--accent);
    font-size: 13px;
  }

  /* ── REPRODUCTOR DE VIDEO FLOTANTE ─────────────────────── */
  .video-player-wrap {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 380px;
    background: var(--bg2);
    border: 1px solid var(--accent);
    border-radius: 10px;
    overflow: hidden;
    z-index: 600;
    box-shadow: 0 16px 50px rgba(0,0,0,0.6);
  }
  .video-player-header {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px 12px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .5px;
    color: var(--text);
  }
  .video-player-header-text {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    overflow: hidden;
  }
  .video-player-header-text span:first-child {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .video-player-header > div:last-child {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .video-player-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    padding: 3px 8px;
    cursor: pointer;
    transition: all .15s;
  }
  .video-player-btn:hover { border-color: var(--accent); color: var(--accent); }
  .video-player {
    width: 100%;
    display: block;
    background: #000;
    max-height: 280px;
  }

  /* Lista desplegable de jugadas dentro del reproductor */
  .video-inline-playlist {
    max-height: 220px;
    overflow-y: auto;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 6px;
  }
  .inline-playlist-item {
    display: grid;
    grid-template-columns: 20px 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 6px 8px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 11px;
    transition: background .15s;
  }
  .inline-playlist-item:hover { background: var(--bg3); }
  .inline-playlist-item.active {
    background: var(--accent);
    color: #000;
  }
  .inline-playlist-item.active .playlist-item-desc,
  .inline-playlist-item.active .playlist-item-time,
  .inline-playlist-item.active .playlist-item-num { color: #000; }
  .inline-playlist-item .playlist-item-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    color: var(--accent);
    text-align: center;
  }
  .inline-playlist-item .playlist-item-desc { color: var(--text); }
  .inline-playlist-item .playlist-item-time { color: var(--text-dim); font-size: 10px; }

  /* Barra de filtro por valoración dentro del reproductor */
  .eval-filter-bar {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    padding: 6px 8px 8px;
    border-bottom: 1px solid var(--border);
  }
  .eval-filter-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--ev-color, var(--text-dim));
    cursor: pointer;
    transition: all .15s;
  }
  .eval-filter-btn:hover { border-color: var(--ev-color, var(--text-dim)); }
  .eval-filter-btn.active {
    background: var(--ev-color, var(--accent));
    color: #000;
    border-color: var(--ev-color, var(--accent));
  }

  /* Cuando el wrapper completo entra en fullscreen del navegador,
     mantenemos el header con los botones siempre visible */
  .video-player-wrap:fullscreen {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    bottom: auto;
    right: auto;
    border-radius: 0;
  }
  .video-player-wrap:fullscreen .video-player {
    flex: 1;
    max-height: none;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .video-player-wrap:fullscreen .video-player-header {
    flex-shrink: 0;
  }

  @media print {
    .video-player-wrap, .playlist-modal-overlay { display: none !important; }
  }


  /* ── MÓDULO ATACANTES ───────────────────────────────── */
  .attackers-section { margin-top: 40px; }

  /* ── LINKS PERSONALIZADOS (acciones destacadas) ───────── */
  .custom-links-section { margin-top: 40px; margin-bottom: 40px; }

  .custom-link-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .custom-link-fields {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .custom-link-title {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 7px 12px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    outline: none;
    transition: border-color .15s;
  }
  .custom-link-title:focus { border-color: var(--accent); }
  .custom-link-title::placeholder { color: var(--text-dim); font-weight: 500; }

  .custom-link-url {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 6px 12px;
    color: var(--accent);
    font-size: 13px;
    font-family: 'Barlow', sans-serif;
    outline: none;
    transition: border-color .15s;
  }
  .custom-link-url:focus { border-color: var(--accent); }
  .custom-link-url::placeholder { color: var(--text-dim); }

  .custom-link-comment {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 7px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Barlow', sans-serif;
    outline: none;
    resize: vertical;
    min-height: 40px;
    transition: border-color .15s;
  }
  .custom-link-comment:focus { border-color: var(--accent); }
  .custom-link-comment::placeholder { color: var(--text-dim); }

  .custom-link-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    padding-top: 4px;
  }
  .custom-link-open {
    font-size: 18px;
    color: var(--accent);
    text-decoration: none;
    transition: opacity .15s;
  }
  .custom-link-open:hover { opacity: .7; }
  .custom-link-remove {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-dim);
    font-size: 13px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all .15s;
  }
  .custom-link-remove:hover { border-color: var(--red); color: var(--red); }

  @media print {
    .custom-link-remove { display: none; }
    .custom-link-row { break-inside: avoid; }

<body>

<header>
  <h1>Análisis / Plan de Juego</h1>
  <div class="header-meta" id="team-switcher"></div>
</header>

<div class="toolbar">
  <label>Scouts:</label>
  <button class="btn primary" onclick="document.getElementById('file-input').click()">+ Agregar Scout DVW</button>
  <input type="file" id="file-input" accept=".dvw" multiple>
  <div class="files-list" id="files-list"></div>

  <label style="margin-left:14px">Video:</label>
  <button class="btn" onclick="document.getElementById('video-input').click()">🎬 Cargar video del partido</button>
  <input type="file" id="video-input" accept="video/*" style="display:none" onchange="loadMatchVideo(this)">
  <span id="video-status" style="font-size:11px;color:var(--text-dim)"></span>

  <div style="margin-left:auto; display:flex; gap:10px; align-items:center;">
    <label>Recepción:</label>
    <div class="filter-toggle">
      <button id="btn-all" onclick="setFilter('all')">Todas</button>
      <button id="btn-quality" class="active" onclick="setFilter('quality')"># y + solo</button>
    </div>
    <button class="btn" onclick="exportLinksFile()" title="Descargar links y datos guardados en un archivo">💾 Guardar links</button>
    <button class="btn" onclick="document.getElementById('links-input').click()" title="Cargar links desde un archivo">📂 Cargar links</button>
    <input type="file" id="links-input" accept=".json" style="display:none" onchange="importLinksFile(this)">
    <button class="btn" onclick="window.print()">🖨 Descargar PDF</button>
    <button class="btn primary" onclick="exportReadOnlyView()" title="Genera un HTML navegable sin opción de editar">👁 Vista para compartir</button>
  </div>
</div>

<main id="main-content">
  <div class="empty-state" id="empty-state">
    <div class="icon">📋</div>
    <h2>Cargá un Scout DVW</h2>
    <p>Hacé clic en "Agregar Scout DVW" para comenzar el análisis</p>
    <button class="btn primary" onclick="document.getElementById('file-input').click()" style="margin-top:8px">Cargar archivo .dvw</button>
  </div>
  <div id="dashboard" style="display:none"></div>
</main>

<script>
// ═══════════════════════════════════════════════════════
//  ESTADO GLOBAL
// ═══════════════════════════════════════════════════════
let state = {
  files: [],          // {name, data: {teams, setter_distribution}}
  activeTeam: null,   // 'H' | 'V'
  filter: 'quality',  // 'all' | 'quality'
  videoLinks: {},     // key: `${teamSide}_rot${n}` → url/filename
  playerOverrides: {},// key: pid → {number, lastName, firstInit, role}
  comboVideos: {},    // key: `${pid}_${combo}` → url
  customLinks: [],    // [{id, title, comment, url}] — acciones destacadas libres
  matchVideoURL:  null, // object URL del video cargado (no persiste — es local a la sesión)
  matchVideoName: null,
};

// ═══════════════════════════════════════════════════════
//  PARSEO DVW EN BROWSER (dvw_parser_v1 portado a JS)
// ═══════════════════════════════════════════════════════

const ATTACK_COMBOS = {
  W: ['W4','W2'],
  G: ['G4','G2','G8','G9'],
  Y: ['Y8','Y9'],
  J: ['J1','J2','J3','J4','J5'],
};
const COMBO_ALL = new Set(Object.values(ATTACK_COMBOS).flat());
const VALID_ZONES = new Set(['2','3','4','8','9']);
const QUALITY_REC = new Set(['#','+']);
const SPECIAL_PFX = [
  '*p', 'ap',   // punto (p minúscula) — marcador del partido
  '*P', 'aP',   // armador (P mayúscula) — indica quién es el armador
  '*z', 'az',   // posición del armador en cancha
  '*c', 'ac',   // cambio
  '*T', 'aT',   // timeout
  '**', 'a$', '*$',
];

function getComboGroup(combo) {
  for (const [g, codes] of Object.entries(ATTACK_COMBOS)) {
    if (codes.includes(combo)) return g;
  }
  return null;
}

function parseScoutLine(line) {
  const parts = line.split(';');
  const code  = parts[0];
  const result = {
    raw: line, team: null, player: null, skill: null,
    qualifier: null, eval_: null, combo: null, combo_group: null,
    zone: null, atk_from: null, atk_to: null, setter_call: null,
    srv_from: null, srv_to: null,
    set_num: null, rotation_v: null, rotation_h: null,
    score_h: null, score_v: null,
    video_time: null,   // segundos absolutos en el video (parts[12])
    special: false,
  };

  try { result.set_num    = parts[8]  ? parseInt(parts[8])  : null; } catch(e){}
  try { result.rotation_h = parts[9]  ? parseInt(parts[9])  : null; } catch(e){}  // local (*)
  try { result.rotation_v = parts[10] ? parseInt(parts[10]) : null; } catch(e){}  // visitante (a)
  try { result.score_h    = parts[14] ? parseInt(parts[14]) : null; } catch(e){}
  try { result.score_v    = parts[15] ? parseInt(parts[15]) : null; } catch(e){}
  try { result.video_time = parts[12] ? parseInt(parts[12]) : null; } catch(e){}

  if (!code || SPECIAL_PFX.some(p => code.startsWith(p))) {
    result.special = true; return result;
  }
  if (code.length < 2 || !['*','a'].includes(code[0])) {
    result.special = true; return result;
  }

  // 'a' = visitante (V), '*' = local (H)
  result.team   = code[0] === '*' ? 'H' : 'V';
  if (code.length < 3 || !/^\d\d$/.test(code.slice(1,3))) {
    result.special = true; return result;
  }
  result.player    = code.slice(1,3);
  result.skill     = code[3]  || null;
  result.qualifier = code[4]  || null;
  result.eval_     = code[5]  || null;

  const rest = code.slice(6);
  const cm   = rest.match(/^([A-Z][A-Z0-9])~(\d)(\d)?/);
  if (cm && COMBO_ALL.has(cm[1])) {
    result.combo       = cm[1];
    result.combo_group = getComboGroup(cm[1]);
    result.zone        = cm[1][0] === 'J' ? '3' : cm[1][1];
    result.atk_from    = cm[2];
    result.atk_to      = cm[3] || null;  // puede ser undefined si solo hay 1 dígito
  }
  const sm = rest.match(/^(K[A-Z0-9]+)/);
  if (sm) result.setter_call = sm[1];

  // Saque: formato ~~~[origen][destino] — solo 1=zaguero der, 6=zaguero centro, 5=zaguero izq
  if (result.skill === 'S') {
    const svm = rest.match(/^~~~(\d)(\d)?/);
    if (svm) {
      result.srv_from = svm[1];
      result.srv_to   = svm[2] || null;
    }
  }

  return result;
}

function parseDVW(text) {
  const sections = {};
  let cur = null, lines = [];
  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (line.startsWith('[3') && line.endsWith(']')) {
      if (cur) sections[cur] = lines;
      cur = line.slice(1,-1);
      lines = [];
    } else { lines.push(line); }
  }
  if (cur) sections[cur] = lines;

  const teams   = parseTeams(sections['3TEAMS'] || []);
  const players = {
    ...parsePlayers(sections['3PLAYERS-H'] || [], 'H'),
    ...parsePlayers(sections['3PLAYERS-V'] || [], 'V'),
  };
  const scoutRaw    = sections['3SCOUT'] || [];
  const scoutParsed = scoutRaw.filter(l=>l).map(parseScoutLine);
  const dist        = computeSetterDist(scoutParsed);
  const all_attacks = collectAllAttacks(scoutParsed);
  const all_serves  = collectAllServes(scoutParsed);

  return { teams, players, setter_distribution: dist, all_attacks, all_serves };
}

function collectAllServes(scout) {
  // Todos los saques del scout: SQ (potencia) y SM (flotado)
  // Posición de saque: 1, 5 o 6. Destino: zona de la cancha rival (1-9)
  const actions = scout.filter(a => !a.special && a.skill);
  const result  = { H: [], V: [] };
  const VALID_SRV_FROM = new Set(['1','5','6']);
  for (const a of actions) {
    if (a.skill !== 'S') continue;
    if (!a.srv_from || !VALID_SRV_FROM.has(a.srv_from)) continue;
    const side = a.team;
    result[side].push({
      qualifier:    a.qualifier, // 'M' flotado o 'Q' potencia
      result:       a.eval_,
      player:       a.player,
      player_key:   side + '_' + a.player,
      srv_from:     a.srv_from,
      srv_to:       a.srv_to || null,
      set_num:      a.set_num,
      video_time:   a.video_time,
    });
  }
  return result;
}

function collectAllAttacks(scout) {
  // Todos los ataques del scout, sin filtro de recepción
  // Usado para la sección de direcciones de ataque
  const actions = scout.filter(a => !a.special && a.skill);
  const result  = { H: [], V: [] };
  for (const a of actions) {
    if (a.skill !== 'A') continue;
    if (!COMBO_ALL.has(a.combo) || !VALID_ZONES.has(a.zone)) continue;
    const side = a.team; // 'H' o 'V'
    result[side].push({
      combo:        a.combo,
      zone:         a.zone,
      group:        a.combo_group,
      attack_result:a.eval_,
      player:       a.player,
      player_key:   side + '_' + a.player, // clave única con side para evitar mezcla
      atk_from:     a.atk_from || null,
      atk_to:       a.atk_to   || null,
      set_num:      a.set_num,
      video_time:   a.video_time,
    });
  }
  return result;
}

function parseTeams(lines) {
  const teams = {};
  for (const line of lines) {
    if (!line) continue;
    const p = line.split(';');
    if (p.length >= 2) {
      const id = parseInt(p[0]);
      if (!isNaN(id)) {
        const side = !('H' in teams) ? 'H' : 'V';
        teams[side] = { id, name: p[1] };
      }
    }
  }
  return teams;
}

function parsePlayers(lines, side) {
  const players = {};
  for (const line of lines) {
    if (!line) continue;
    const p = line.split(';');
    if (p.length >= 11) {
      const num  = p[1].trim();
      const last = p[9].trim();
      const first= p[10].trim();
      // Normalizar a 2 dígitos para que coincida con code.slice(1,3) del scout
      const numPadded = num.padStart(2, '0');
      const key = `${side}_${numPadded}`;
      players[key] = { number: num, last_name: last, first_name: first, side,
        full_name: `${last} ${first}`.trim() };
    }
  }
  return players;
}

function computeSetterDist(scout) {
  const actions = scout.filter(a => !a.special && a.skill);
  const rallies = { H: [], V: [] };

  for (let i = 0; i < actions.length; i++) {
    const a = actions[i];
    if (a.skill !== 'R') continue;
    const recTeam = a.team, recEval = a.eval_;
    const rotation = recTeam === 'H' ? a.rotation_h : a.rotation_v;
    for (let j = i+1; j < actions.length; j++) {
      const b = actions[j];
      if (b.skill === 'S') break;
      if (b.skill === 'A' && b.team === recTeam
          && COMBO_ALL.has(b.combo) && VALID_ZONES.has(b.zone)) {
        rallies[recTeam].push({
          reception_eval: recEval,
          rotation,
          set_num:   a.set_num,
          score_h:   a.score_h,
          score_v:   a.score_v,
          attack: b,
        });
        break;
      }
    }
  }

  return {
    H: compileDist(rallies.H),
    V: compileDist(rallies.V),
  };
}

function compileDist(rallies) {
  function newB() {
    return { by_zone:{}, by_combo:{}, by_group:{} };
  }
  function incr(b, key, sub, val) {
    if (!b[key]) b[key] = {};
    if (!b[key][sub]) b[key][sub] = 0;
    b[key][sub] += val;
  }

  const gAll = newB(), gQ = newB();
  let tAll = 0, tQ = 0;
  const byRot = {};
  const details = [];

  for (const r of rallies) {
    const { combo, zone, combo_group: group, eval_: result } = r.attack;
    const reception = r.reception_eval;
    const rotation  = r.rotation || 0;
    const isQ       = QUALITY_REC.has(reception);

    if (!byRot[rotation]) {
      byRot[rotation] = { all: newB(), quality: newB(), tAll: 0, tQ: 0 };
    }

    tAll++;
    incr(gAll.by_zone,  zone,  result, 1);
    incr(gAll.by_combo, combo, result, 1);
    if (group) incr(gAll.by_group, group, result, 1);

    byRot[rotation].tAll++;
    incr(byRot[rotation].all.by_zone,  zone,  result, 1);
    incr(byRot[rotation].all.by_combo, combo, result, 1);
    if (group) incr(byRot[rotation].all.by_group, group, result, 1);

    if (isQ) {
      tQ++;
      incr(gQ.by_zone,  zone,  result, 1);
      incr(gQ.by_combo, combo, result, 1);
      if (group) incr(gQ.by_group, group, result, 1);

      byRot[rotation].tQ++;
      incr(byRot[rotation].quality.by_zone,  zone,  result, 1);
      incr(byRot[rotation].quality.by_combo, combo, result, 1);
      if (group) incr(byRot[rotation].quality.by_group, group, result, 1);
    }

    details.push({
      set: r.set_num, score_h: r.score_h, score_v: r.score_v,
      rotation, combo, zone, group,
      attack_result: result, reception_quality: reception,
      in_condition: isQ, player: r.attack.player,
      atk_from: r.attack.atk_from || null,
      atk_to:   r.attack.atk_to   || null,
      video_time: r.attack.video_time != null ? r.attack.video_time : (r.video_time != null ? r.video_time : null),
    });
  }

  function finalize(b, total) {
    const out = {};
    for (const [type, raw] of Object.entries(b)) {
      out[type] = {};
      for (const [key, results] of Object.entries(raw)) {
        const count = Object.values(results).reduce((s,v)=>s+v,0);
        out[type][key] = { count, pct: total ? +(count/total*100).toFixed(1) : 0, results };
      }
    }
    return { total, ...out };
  }

  const by_rotation = {};
  for (const [rot, rb] of Object.entries(byRot)) {
    by_rotation[rot] = {
      all:     finalize(rb.all,     rb.tAll),
      quality: finalize(rb.quality, rb.tQ),
    };
  }

  return {
    all:         finalize(gAll, tAll),
    quality:     finalize(gQ,   tQ),
    by_rotation, details,
  };
}

// Devuelve lista de equipos únicos en todos los archivos: [{name, side, fileIdx}]
function getAllTeams(dataList) {
  const seen = {};
  const result = [];
  dataList.forEach((d, fi) => {
    ['H','V'].forEach(side => {
      const t = d.teams[side];
      if (!t || seen[t.name]) return;
      seen[t.name] = true;
      result.push({ name: t.name, side, fileIdx: fi });
    });
  });
  return result;
}

// Acumula datos de UN equipo específico (por nombre) en todos los archivos
// Usa clave neutral "P_03" para jugadores, sin importar si era H o V en cada partido
function mergeForTeam(dataList, teamName) {
  if (!dataList.length || !teamName) return null;

  function detailsToRallies(details) {
    return details.map(d => ({
      reception_eval: d.reception_quality,
      rotation: d.rotation,
      set_num: d.set,
      attack: {
        combo: d.combo, zone: d.zone, combo_group: d.group,
        eval_: d.attack_result, player: d.player,
        atk_from: d.atk_from || null, atk_to: d.atk_to || null,
        video_time: d.video_time != null ? d.video_time : null,
      }
    }));
  }

  const allDetails = [];
  const allAtks    = [];
  const allServes  = [];
  const players    = {};  // clave siempre "P_03" (neutral)

  dataList.forEach(d => {
    ['H','V'].forEach(side => {
      const t = d.teams[side];
      if (!t || t.name !== teamName) return;

      // Acumular players con clave neutral P_XX
      Object.entries(d.players || {}).forEach(([k, v]) => {
        if (k.startsWith(side + '_')) {
          const num = k.slice(side.length + 1); // extraer "03" de "H_03"
          players['P_' + num] = v;
        }
      });

      // Acumular distribution details
      allDetails.push(...(d.setter_distribution[side]?.details || []));

      // Acumular all_attacks — re-mapear player_key a P_XX
      const atks = (d.all_attacks || {})[side] || [];
      atks.forEach(a => {
        allAtks.push({
          ...a,
          player_key: 'P_' + a.player, // siempre neutral
        });
      });

      // Acumular all_serves — re-mapear player_key a P_XX
      const srvs = (d.all_serves || {})[side] || [];
      srvs.forEach(s => {
        allServes.push({
          ...s,
          player_key: 'P_' + s.player,
        });
      });
    });
  });

  return {
    teamName,
    players,
    setter_distribution: compileDist(detailsToRallies(allDetails)),
    all_attacks: allAtks,
    all_serves:  allServes,
  };
}

// mergeData — ya no se usa, render() siempre llama mergeForTeam directamente
function mergeData(dataList) {
  if (dataList.length === 0) return null;
  return null; // render() usa mergeForTeam siempre
}

const ZONE_COLORS = { '2':'#58a6ff','3':'#bc8cff','4':'#f0b429','8':'#3fb950','9':'#f85149' };
const GROUP_COLORS= { W:'#f0b429', G:'#58a6ff', Y:'#3fb950', J:'#bc8cff' };
const EVAL_COLORS = { '#':'#3fb950','+':'#a0d080','!':'#8b949e','-':'#f0883e','=':'#f85149','/':'#8b949e' };
const EVAL_LABEL  = { '#':'Punto/Perf.', '+':'Positivo', '!':'OK', '-':'Negativo', '=':'Error', '/':'Sobrepase' };
const ZONE_NAMES  = { '2':'Z2','3':'Z3','4':'Z4','8':'Z8','9':'Z9' };
const GROUP_NAMES = { W:'Rápida', G:'Alta', Y:'Zaguero', J:'Central' };

function render() {
  resetPlaysRegistry();
  const dataList = state.files.map(f => f.data);
  if (!dataList.length) {
    document.getElementById('empty-state').style.display = '';
    document.getElementById('dashboard').style.display   = 'none';
    document.getElementById('team-switcher').innerHTML   = '';
    return;
  }
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('dashboard').style.display   = '';

  // Obtener todos los equipos únicos de todos los archivos
  const allTeams = getAllTeams(dataList);

  // Si el equipo activo no está disponible, tomar el primero
  if (!state.activeTeam || !allTeams.find(t => t.name === state.activeTeam)) {
    state.activeTeam = allTeams[0]?.name || null;
  }
  if (!state.activeTeam) return;

  // Team switcher — un botón por equipo único
  const sw = document.getElementById('team-switcher');
  sw.innerHTML = allTeams.map(t => {
    const safe = t.name.replace(/'/g, "\'");
    return `<button class="team-badge ${t.name===state.activeTeam?'active':''}"
      onclick="setTeam('${safe}')">${t.name}</button>`;
  }).join('');

  // Acumular datos solo del equipo seleccionado
  const merged = mergeForTeam(dataList, state.activeTeam);
  if (!merged) return;

  currentPlayersDict = merged.players || {}; // para resolver nombres en el reproductor de video

  const dist = merged.setter_distribution;
  const view = dist[state.filter] || dist.all;
  const db   = document.getElementById('dashboard');

  // Summary bar
  const totalAll = dist.all.total;
  const totalQ   = dist.quality.total;
  const pctQ     = totalAll ? (totalQ/totalAll*100).toFixed(0) : 0;
  const effAll   = calcEff(view.by_zone);

  db.innerHTML = `
    <div class="summary-bar">
      <div class="stat-card">
        <div class="label">Ataques post-recepción</div>
        <div class="value">${view.total}</div>
        <div class="sub">${state.filter==='quality'?`de ${totalAll} total`:'total del partido'}</div>
      </div>
      <div class="stat-card">
        <div class="label">Con recepción # y +</div>
        <div class="value">${totalQ}</div>
        <div class="sub">${pctQ}% del total</div>
      </div>
      <div class="stat-card">
        <div class="label">Zona más usada</div>
        <div class="value" style="color:${ZONE_COLORS[topZone(view.by_zone)]}">Z${topZone(view.by_zone)}</div>
        <div class="sub">${view.by_zone[topZone(view.by_zone)]?.pct||0}% de los ataques</div>
      </div>
      <div class="stat-card">
        <div class="label">Efectividad global</div>
        <div class="value" style="color:${effAll>50?'#3fb950':effAll>35?'#f0b429':'#f85149'}">${effAll}%</div>
        <div class="sub">puntos + positivos</div>
      </div>
    </div>

    <div class="section-title">Distribución por Rotación del Armador · ${state.filter==='quality'?'Recepción # y + únicamente':'Todas las recepciones'}</div>
    <div class="rotations-grid" id="rot-grid"></div>

    <div class="attackers-section">
      <div class="section-title">Análisis de Atacantes · Direcciones de Ataque</div>
      <div id="attacker-list"></div>
    </div>

    <div class="custom-links-section">
      <div class="section-title">Acciones Destacadas · Links de Video</div>
      <div id="custom-links-list"></div>
      <button class="btn primary" onclick="addCustomLink()" style="margin-top:12px">+ Agregar acción</button>
    </div>
  `;

  // Rotaciones
  const grid = document.getElementById('rot-grid');
  const rots = [5,6,1,4,3,2];
  for (const rot of rots) {
    const rd    = dist.by_rotation[rot];
    const rv    = rd ? rd[state.filter] || rd.all : null;
    const total = rv ? rv.total : 0;
    grid.appendChild(renderRotCard(rot, rv, total, dist.details));
  }

  // Atacantes
  renderAttackers(dist, merged.players || {}, state.activeTeam, merged);

  // Links personalizados (acciones destacadas)
  renderCustomLinks();
}

function topZone(by_zone) {
  if (!by_zone || Object.keys(by_zone).length === 0) return '4';
  return Object.entries(by_zone).sort((a,b)=>b[1].count-a[1].count)[0][0];
}

function calcEff(by_zone) {
  if (!by_zone) return 0;
  let pts=0, total=0;
  for (const info of Object.values(by_zone)) {
    total += info.count;
    pts   += (info.results?.['#']||0) + (info.results?.['+']||0);
  }
  return total ? Math.round(pts/total*100) : 0;
}

function renderRotCard(rot, rv, total, allDetails) {
  const card = document.createElement('div');
  card.className = 'rot-card';
  card.id = `rot-card-${rot}`;

  const vkey  = `${state.activeTeam}_rot${rot}`;
  const vdata = state.videoLinks[vkey] || { url:'', label:'' };

  const hasData = total > 0;
  const zones   = ['4','3','2','9','8'];

  // Registrar todas las jugadas de esta rotación (sin filtrar por zona) para el reproductor directo
  const rotPlaysFilter = (allDetails || []).filter(d =>
    d.rotation == rot && (state.filter === 'all' || d.in_condition)
  );
  const rotPlaysId = registerPlays(rotPlaysFilter);

  card.innerHTML = `
    <div class="rot-header">
      <span class="rot-title" ${hasData ? `onclick="playAllDirectly('${rotPlaysId}')" style="cursor:pointer" title="Reproducir todas las jugadas de esta rotación"` : ''}>Rotación ${rot}</span>
      <span class="rot-count">${hasData ? `${total} ataque${total!==1?'s':''}` : 'Sin datos'}</span>
    </div>
    <div class="rot-body">
      <div class="court-wrap">
        ${renderCourtSVG(rot, rv, hasData)}
      </div>
      ${hasData ? renderZoneBars(rv, zones) : '<p style="text-align:center;color:var(--text-dim);font-size:12px;padding:8px 0">Sin ataques en esta rotación</p>'}
      ${hasData ? renderEffLegend(rv) : ''}
      <div class="video-row">
        <input type="text" class="video-link-input" placeholder="🔗 Link de video (YouTube, Drive…)"
          id="vlink-${rot}" value="${escHtml(vdata.url)}"
          onchange="saveVideoLink(${rot}, this.value)">
        ${vdata.url ? `<a href="${escHtml(vdata.url)}" target="_blank" class="video-btn" title="Abrir video">▶️</a>` : ''}
      </div>
    </div>
  `;
  return card;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function saveVideoLink(rot, url) {
  const vkey = `${state.activeTeam}_rot${rot}`;
  if (!state.videoLinks[vkey]) state.videoLinks[vkey] = {};
  state.videoLinks[vkey].url = url;
  savePersistedState();
  // Re-render solo ese card para mostrar/ocultar el botón ▶️
  const merged = mergeForTeam(state.files.map(f => f.data), state.activeTeam);
  if (!merged) return;
  const dist = merged.setter_distribution;
  const rd   = dist.by_rotation[rot];
  const rv   = rd ? rd[state.filter] || rd.all : null;
  const total= rv ? rv.total : 0;
  const newCard = renderRotCard(rot, rv, total, dist.details);
  const old = document.getElementById(`rot-card-${rot}`);
  if (old) old.replaceWith(newCard);
}

// ═══════════════════════════════════════════════════════
//  CANCHA SVG
// ═══════════════════════════════════════════════════════

/*
  Layout cancha (vista del equipo receptor/atacante):
  ┌──────────────────────────────┐
  │  Z4   │   Z3    │   Z2      │  fila delantera
  ├────────────────────────────── RED
  │ vacío  │   Z8   │   Z9      │  fila trasera
  └──────────────────────────────┘
  Z8 = pipe (izquierda fila trasera)
  Z9 = zaguero por 1 (derecha fila trasera)
  Esquina inferior izquierda = siempre vacía
*/

function renderCourtSVG(rot, rv, hasData) {
  const W=260, H=160;
  const cw = W/3, rh = H/2;

  const zoneLayout = [
    { zone:'4', col:0, row:0 },
    { zone:'3', col:1, row:0 },
    { zone:'2', col:2, row:0 },
    { zone:'8', col:1, row:1 },
    { zone:'9', col:2, row:1 },
  ];

  let cells = '';

  for (const { zone, col: c, row: r } of zoneLayout) {
    const x = c * cw + 2;
    const y = r * rh + 2;
    const w = cw - 4;
    const h = rh - 4;

    const info  = rv?.by_zone?.[zone];
    const count = info?.count || 0;
    const pct   = info?.pct   || 0;
    const zoneColor = '#6e7681';  // color neutro igual para todas las zonas
    const opacity = hasData && count > 0 ? Math.max(0.18, pct/100 * 0.7 + 0.18) : 0.07;

    let eff = 0;
    if (info?.results) {
      const pts = (info.results['#']||0) + (info.results['+']||0);
      eff = count ? Math.round(pts/count*100) : 0;
    }
    const effColor = eff >= 50 ? '#3fb950' : eff >= 30 ? '#f0b429' : '#f85149';

    const clickable = hasData && count > 0;
    const cursor    = clickable ? 'cursor:pointer;' : '';
    const onclick   = clickable ? `onclick="openZonePopup(${rot},'${zone}')"` : '';

    cells += `
      <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4"
        fill="${zoneColor}" opacity="${opacity}" stroke="${zoneColor}" stroke-width="1" stroke-opacity="0.4"
        style="${cursor}" ${onclick}/>
    `;

    if (hasData && count > 0) {
      cells += `
        <text x="${x+w/2}" y="${y+h/2-8}" text-anchor="middle" pointer-events="none"
          font-family="'Barlow Condensed',sans-serif" font-weight="900" font-size="22" fill="#e6edf3">${count}</text>
        <text x="${x+w/2}" y="${y+h/2+6}" text-anchor="middle" pointer-events="none"
          font-family="'Barlow',sans-serif" font-size="10" fill="#e6edf3" opacity="0.7">${pct}%</text>
        <text x="${x+w/2}" y="${y+h/2+18}" text-anchor="middle" pointer-events="none"
          font-family="'Barlow',sans-serif" font-size="9" fill="${effColor}">${eff>0?`ef.${eff}%`:''}</text>
      `;
    } else {
      cells += `
        <text x="${x+w/2}" y="${y+h/2+4}" text-anchor="middle" pointer-events="none"
          font-family="'Barlow Condensed',sans-serif" font-size="13" fill="${zoneColor}" opacity="0.4">Z${zone}</text>
      `;
    }

    cells += `
      <text x="${x+5}" y="${y+13}" pointer-events="none"
        font-family="'Barlow Condensed',sans-serif" font-size="10" font-weight="700"
        fill="${zoneColor}" opacity="0.7">Z${zone}</text>
    `;
  }

  const netY = rh + 2;
  const netLine = `
    <line x1="0" y1="${netY}" x2="${W}" y2="${netY}"
      stroke="#f0b429" stroke-width="2.5" stroke-dasharray="4 3" opacity="0.5"/>
    <text x="${W/2}" y="${netY-4}" text-anchor="middle" pointer-events="none"
      font-family="'Barlow Condensed',sans-serif" font-size="8" fill="#f0b429" opacity="0.5">RED</text>
  `;

  return `
    <svg class="court-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      <rect width="${W}" height="${H}" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      ${cells}
      ${netLine}
    </svg>
  `;
}

function renderZoneBars(rv, zones) {
  if (!rv || !rv.by_zone) return '';
  const total = rv.total;
  let bars = '<div class="zone-bars">';
  for (const z of zones) {
    const info  = rv.by_zone?.[z];
    const count = info?.count || 0;
    const pct   = info?.pct   || 0;
    const color = ZONE_COLORS[z];
    bars += `
      <div class="zone-bar-item">
        <div class="zone-bar-label" style="color:${color}">Z${z}</div>
        <div class="zone-bar-fill" style="background:${color};opacity:${count?0.7:0.15};height:4px;border-radius:2px"></div>
        <div class="zone-bar-pct">${count||0}</div>
      </div>`;
  }
  bars += '</div>';
  return bars;
}

function renderEffLegend(rv) {
  // Calcular por grupo
  if (!rv?.by_group) return '';
  const groups = ['W','G','Y','J'];
  let html = '<div class="eff-legend">';
  for (const g of groups) {
    const info = rv.by_group?.[g];
    if (!info || info.count === 0) continue;
    const pts = (info.results?.['#']||0) + (info.results?.['+']||0);
    const eff = Math.round(pts/info.count*100);
    html += `<div class="eff-item">
      <div class="eff-dot" style="background:${GROUP_COLORS[g]}"></div>
      <span style="color:var(--text)">${GROUP_NAMES[g]}</span>
      <span>${info.count} · ${eff}% ef.</span>
    </div>`;
  }
  html += '</div>';
  return html;
}

document.getElementById('file-input').addEventListener('change', async function(e) {

//  PERSISTENCIA — localStorage automático + export/import JSON
// ═══════════════════════════════════════════════════════

const STORAGE_KEY = 'voley_dashboard_links_v1';

function getPersistableState() {
  return {
    videoLinks:      state.videoLinks,
    playerOverrides: state.playerOverrides,
    comboVideos:     state.comboVideos,
    customLinks:     state.customLinks,
  };
}

function savePersistedState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(getPersistableState()));
  } catch (e) {
    console.warn('No se pudo guardar en localStorage:', e);
  }
}

function loadPersistedState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (saved.videoLinks)      state.videoLinks      = saved.videoLinks;
    if (saved.playerOverrides) state.playerOverrides = saved.playerOverrides;
    if (saved.comboVideos)     state.comboVideos     = saved.comboVideos;
    if (saved.customLinks)     state.customLinks     = saved.customLinks;
  } catch (e) {
    console.warn('No se pudo cargar de localStorage:', e);
  }
}

function exportLinksFile() {
  const data = getPersistableState();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'links_videos_y_datos.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importLinksFile(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const saved = JSON.parse(e.target.result);
      if (saved.videoLinks)      state.videoLinks      = saved.videoLinks;
      if (saved.playerOverrides) state.playerOverrides = saved.playerOverrides;
      if (saved.comboVideos)     state.comboVideos     = saved.comboVideos;
      if (saved.customLinks)     state.customLinks     = saved.customLinks;
      savePersistedState();
      render();
      alert('Links y datos cargados correctamente.');
    } catch (err) {
      alert('El archivo no es válido.');
    }
  };
  reader.readAsText(input.files[0]);
  input.value = '';
}

          value="${escHtml(item.title || '')}"
          onchange="updateCustomLink('${item.id}','title',this.value)">
        <input class="custom-link-url" type="text" placeholder="🔗 Link del video"
          value="${escHtml(item.url || '')}"
          onchange="updateCustomLink('${item.id}','url',this.value)">
        <textarea class="custom-link-comment" placeholder="Comentarios..."
          onchange="updateCustomLink('${item.id}','comment',this.value)">${escHtml(item.comment || '')}</textarea>
      </div>
      <div class="custom-link-actions">
        ${item.url ? `<a href="${escHtml(item.url)}" target="_blank" class="custom-link-open" title="Abrir video">▶</a>` : ''}
        <button class="custom-link-remove" onclick="removeCustomLink('${item.id}')" title="Eliminar">✕</button>
      </div>
    </div>
  `).join('');
}

function addCustomLink() {
  const id = 'cl_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  state.customLinks.push({ id, title: '', url: '', comment: '' });
  savePersistedState();
  renderCustomLinks();
}

function updateCustomLink(id, field, value) {
  const item = state.customLinks.find(c => c.id === id);
  if (!item) return;
  item[field] = value;
  savePersistedState();
  // Solo re-renderizar el botón ▶ si cambia la URL, sin perder el foco de otros campos
  if (field === 'url') renderCustomLinks();
}

function removeCustomLink(id) {
  state.customLinks = state.customLinks.filter(c => c.id !== id);
  savePersistedState();
  renderCustomLinks();
}

function exportReadOnlyView() {
  if (!state.activeTeam) {
    alert('Primero cargá un scout y seleccioná un equipo.');
    return;
  }

  // Clonar el contenido actual del dashboard ya renderizado
  const headerClone = document.querySelector('header').cloneNode(true);
  const dashClone    = document.getElementById('dashboard').cloneNode(true);

  // ── Limpiar header: quitar todos los botones de equipo salvo el activo ──
  const teamBtns = headerClone.querySelectorAll('.team-badge');
  teamBtns.forEach(btn => {
    if (!btn.classList.contains('active')) btn.remove();
    else {
      // Convertir a texto plano (span), ya no es un botón clickeable
      const span = document.createElement('span');
      span.className = 'team-badge active';
      span.textContent = btn.textContent;
      btn.replaceWith(span);
    }
  });

  // ── Convertir todos los <input> y <textarea> en texto plano ──
  function freezeInputs(root) {
    root.querySelectorAll('input, textarea').forEach(inp => {
      const val = inp.value || '';
      if (inp.type === 'file') { inp.remove(); return; }
      const span = document.createElement('span');
      span.className = 'frozen-field';
      span.textContent = val;
      if (!val) span.classList.add('frozen-field-empty');
      inp.replaceWith(span);
    });
  }
  freezeInputs(dashClone);

  // ── Quitar elementos solo de edición (botón cámara, attach inputs, etc.) ──
  dashClone.querySelectorAll('.player-circle-overlay').forEach(el => el.remove());
  dashClone.querySelectorAll('.player-photo-input').forEach(el => el.remove());
  dashClone.querySelectorAll('.combo-video-input, .video-link-input').forEach(el => {
    // ya fueron congelados arriba como .frozen-field, pero por si acaso
  });

  // Quitar cursor/onclick de elementos que ya no deben ser interactivos
  dashClone.querySelectorAll('[onclick]').forEach(el => {
    const onclick = el.getAttribute('onclick') || '';
    // Mantener solo onclick de cosas de navegación simples (acordeones, tabs)
    // El popup de zona requiere todo el state, no es viable en la vista exportada
    if (/toggleAccordion|switchSkillTab/.test(onclick)) {
      // se re-conecta más abajo via script embebido
    } else {
      el.removeAttribute('onclick');
      el.style.cursor = 'default';
    }
  });
  // Sacar el cursor:pointer de los círculos de jugador (ya no son clickeables)
  dashClone.querySelectorAll('.player-circle').forEach(el => { el.style.cursor = 'default'; });
  // Sacar cursor:pointer de los badges SVG de jugadas (no hay video en la vista exportada)
  dashClone.querySelectorAll('svg rect[style*="cursor:pointer"]').forEach(el => {
    el.style.cursor = 'default';
  });

  // Quitar el botón "+ Agregar acción" de links personalizados
  dashClone.querySelectorAll('.custom-link-remove').forEach(el => el.remove());
  dashClone.querySelectorAll('.custom-links-section .btn').forEach(el => el.remove());

  // ── Armar el documento final ──
  const styles = document.querySelector('style').outerHTML;
  const fontLink = '<link rel="preconnect" href="https://fonts.googleapis.com">';

  const finalHtml = `<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan de Juego — ${state.activeTeam} (Solo lectura)</title>
${fontLink}
${styles}
<style>
  .toolbar, .player-photo-input, .editable-field { display: none !important; }
  .frozen-field {
    display: inline-block;
    color: var(--text);
    padding: 0 2px;
    font: inherit;
  }
  .frozen-field-empty::after { content: '—'; color: var(--text-dim); }
  .readonly-banner {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 6px 32px;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: center;
  }
  .player-row, .player-circle { cursor: pointer; }
</style>
</head>
<body>
<div class="readonly-banner">📖 Vista de solo lectura — ${state.activeTeam}</div>
${headerClone.outerHTML}
<main id="main-content">
${dashClone.outerHTML}
</main>
<script>
  // Re-conectar navegación básica (acordeones, tabs, popups) sin edición
  function toggleAccordion(pid) {
    const el = document.getElementById('acc-' + pid);
    if (el) el.classList.toggle('open');
  }
  function switchSkillTab(btn, pid, skill) {
    const parent = btn.closest('.player-accordion-body');
    parent.querySelectorAll('.skill-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const atkPanel = document.getElementById('panel-atk-' + pid);
    const srvPanel = document.getElementById('panel-srv-' + pid);
    if (atkPanel) atkPanel.style.display = skill === 'atk' ? '' : 'none';

<\/script>

  const blob = new Blob([finalHtml], { type: 'text/html' });

//  VIDEO DEL PARTIDO — carga y reproductor de jugadas

let playsRegistry = {}; // id → [jugadas] — se resetea en cada render()
let playsRegistryCounter = 0;
let currentPlayersDict = {}; // diccionario de jugadores del equipo activo, para resolver nombres

function resetPlaysRegistry() {
  playsRegistry = {};
  playsRegistryCounter = 0;
}

function registerPlays(plays) {
  const id = 'pl' + (playsRegistryCounter++);
  playsRegistry[id] = plays;
  return id;
}

function loadMatchVideo(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  if (state.matchVideoURL) URL.revokeObjectURL(state.matchVideoURL);
  state.matchVideoURL  = URL.createObjectURL(file);
  state.matchVideoName = file.name;
  document.getElementById('video-status').textContent = '✓ ' + file.name;
}

// Etiquetas legibles para cada tipo de jugada
const EVAL_FULL_LABEL = { '#':'#', '+':'+', '!':'!', '-':'-', '=':'=', '/':'/' };

function resolvePlayerNameForVideo(player) {
  if (!player) return null;
  const numPad = String(player).padStart(2,'0');
  const p = currentPlayersDict['P_' + numPad]
         || currentPlayersDict['H_' + numPad] || currentPlayersDict['V_' + numPad];
  return p ? `#${p.number} ${p.last_name}` : `#${player}`;
}

function describePlay(p) {
  const name = resolvePlayerNameForVideo(p.player);
  const namePrefix = name ? `${name} · ` : '';
  if (p.combo) {
    // Es un ataque
    return `${namePrefix}${p.combo} · Z${p.atk_from}→Z${p.atk_to} · ${EVAL_FULL_LABEL[p.attack_result]||p.attack_result}`;
  }
  if (p.srv_from !== undefined) {
    // Es un saque
    const tipo = p.qualifier === 'M' ? 'Flotado' : 'Potencia';
    return `${namePrefix}Saque ${tipo} · Z${p.srv_from}→Z${p.srv_to||'?'} · ${EVAL_FULL_LABEL[p.result]||p.result}`;
  }
  return namePrefix || 'Jugada';
}

function getValidPlays(playsId) {
  const plays = (playsRegistry[playsId] || []).filter(p => p.video_time != null);
  if (!state.matchVideoURL) {
    alert('Primero cargá el video del partido con el botón "🎬 Cargar video del partido".');
    return null;
  }
  if (!plays.length) {
    alert('No hay tiempo de video registrado para estas jugadas (el scout puede no tener sincronización de video en esta sección).');
    return null;
  }
  plays.sort((a,b) => (a.video_time||0) - (b.video_time||0));
  return plays;
}

// Obtiene la valoración de una jugada (ataque o saque)
function getPlayResult(p) {
  return p.attack_result || p.result || null;
}

function openPlayList(playsId) {
  const plays = getValidPlays(playsId);
  if (!plays) return;

  const modal = document.getElementById('playlist-modal-overlay');
  const body  = document.getElementById('playlist-modal-body');
  const title = document.getElementById('playlist-modal-title');

  activePlaylistAll = plays;
  activeEvalFilter  = null;
  activePlaylist    = plays;

  title.textContent = `${plays.length} jugada${plays.length!==1?'s':''} — elegí cuál ver`;
  body.innerHTML = plays.map((p, i) => `
    <div class="playlist-item" onclick="playVideoClipAt(${i})">
      <span class="playlist-item-num">${i+1}</span>
      <span class="playlist-item-desc">${describePlay(p)}</span>
      <span class="playlist-item-time">${formatVideoTime(p.video_time)}</span>
      <span class="playlist-item-play">▶</span>
    </div>
  `).join('');

  modal.style.display = 'flex';
}

// Reproduce directo la primera jugada del grupo, sin pasar por el modal de lista.
// Usado en "Rotación N" y en los títulos de combo/saque (categoría completa).
function playAllDirectly(playsId) {
  const plays = getValidPlays(playsId);
  if (!plays) return;
  activePlaylistAll = plays;
  activeEvalFilter  = null;
  activePlaylist    = plays;
  playVideoClipAt(0);
}

function closePlaylistModal() {
  document.getElementById('playlist-modal-overlay').style.display = 'none';
  stopVideoClip();
}

function formatVideoTime(sec) {
  const m = Math.floor(sec/60);
  const s = sec%60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

let clipStopTimer     = null;
let activePlaylistAll = []; // playlist completa, sin filtrar
let activePlaylist    = []; // playlist actualmente visible (filtrada por valoración o no)
let activePlayIdx     = -1;
let activeEvalFilter  = null; // null = todas, o '#','+','!','-','=','/'

const EVAL_FILTER_ORDER = ['#','+','!','-','=','/'];
const EVAL_FILTER_COLOR = { '#':'#3fb950','+':'#a0d080','!':'#8b949e','-':'#f0883e','=':'#f85149','/':'#8b949e' };

function setEvalFilter(ev) {
  activeEvalFilter = (activeEvalFilter === ev) ? null : ev; // toggle: clic de nuevo = quitar filtro
  const filtered = activeEvalFilter
    ? activePlaylistAll.filter(p => getPlayResult(p) === activeEvalFilter)
    : activePlaylistAll;

  // Mantener, si es posible, la jugada que se estaba viendo
  const currentPlay = activePlaylist[activePlayIdx];
  activePlaylist = filtered;

  if (!filtered.length) {
    activePlayIdx = -1;
    updateNavLabel();
    renderInlinePlaylist();
    return;
  }

  let newIdx = currentPlay ? filtered.indexOf(currentPlay) : -1;
  if (newIdx === -1) newIdx = 0;
  playVideoClipAt(newIdx);
}

function playVideoClipAt(idx) {
  if (idx < 0 || idx >= activePlaylist.length) return;
  activePlayIdx = idx;
  const play = activePlaylist[idx];
  playVideoClip(play.video_time);
  updateNavLabel();
  renderInlinePlaylist(); // si está abierta, refrescar para resaltar la activa
}

function navPlay(delta) {
  if (!activePlaylist.length) return;
  const next = activePlayIdx + delta;
  if (next < 0 || next >= activePlaylist.length) return;
  playVideoClipAt(next);
}

function toggleInlinePlaylist() {
  const panel = document.getElementById('video-inline-playlist');
  if (!panel) return;
  const show = panel.style.display === 'none';
  panel.style.display = show ? 'block' : 'none';
  if (show) renderInlinePlaylist();
}

function renderInlinePlaylist() {
  const panel = document.getElementById('video-inline-playlist');
  if (!panel || panel.style.display === 'none') return;

  // Contar cuántas jugadas hay de cada valoración (sobre el total sin filtrar)
  const counts = {};
  for (const p of activePlaylistAll) {
    const ev = getPlayResult(p);
    if (ev) counts[ev] = (counts[ev]||0) + 1;
  }

  const filterBar = `
    <div class="eval-filter-bar">
      <button class="eval-filter-btn ${activeEvalFilter===null?'active':''}" onclick="setEvalFilter(null)">Todas (${activePlaylistAll.length})</button>
      ${EVAL_FILTER_ORDER.filter(ev => counts[ev]).map(ev => `
        <button class="eval-filter-btn ${activeEvalFilter===ev?'active':''}"
          style="--ev-color:${EVAL_FILTER_COLOR[ev]}"
          onclick="setEvalFilter('${ev}')">${ev} (${counts[ev]})</button>
      `).join('')}
    </div>`;

  if (!activePlaylist.length) {
    panel.innerHTML = filterBar + '<p style="padding:10px;color:var(--text-dim);font-size:12px">Sin jugadas con esta valoración.</p>';
    return;
  }

  const items = activePlaylist.map((p, i) => `
    <div class="inline-playlist-item ${i===activePlayIdx?'active':''}" onclick="playVideoClipAt(${i})">
      <span class="playlist-item-num">${i+1}</span>
      <span class="playlist-item-desc">${describePlay(p)}</span>
      <span class="playlist-item-time">${formatVideoTime(p.video_time)}</span>
    </div>
  `).join('');

  panel.innerHTML = filterBar + items;
}

function updateNavLabel() {
  const lbl  = document.getElementById('video-nav-label');
  const desc = document.getElementById('video-current-desc');
  if (lbl) {
    lbl.textContent = (activePlayIdx >= 0 && activePlaylist.length)
      ? `${activePlayIdx+1} / ${activePlaylist.length}` : '';
  }
  if (desc) {
    desc.textContent = (activePlayIdx >= 0 && activePlaylist[activePlayIdx])
      ? describePlay(activePlaylist[activePlayIdx]) : '';
  }
}

function playVideoClip(centerTime) {
  const wrap  = document.getElementById('video-player-wrap');
  const video = document.getElementById('video-player');
  if (!video || !wrap) return;

  if (video.src !== state.matchVideoURL) video.src = state.matchVideoURL;

  const BEFORE = 3, AFTER = 5; // segundos de contexto antes/después
  const start = Math.max(0, centerTime - BEFORE);
  const stop  = centerTime + AFTER;

  wrap.style.display = 'block';
  video.currentTime = start;
  video.play();

  if (clipStopTimer) clearInterval(clipStopTimer);
  clipStopTimer = setInterval(() => {
    if (video.currentTime >= stop) {
      video.pause();
      clearInterval(clipStopTimer);
    }
  }, 100);
}


function stopVideoClip() {
  const video = document.getElementById('video-player');
  if (video) video.pause();
  if (clipStopTimer) clearInterval(clipStopTimer);
}

function replayCurrentClip() {
  const video = document.getElementById('video-player');
  if (!video) return;
  video.currentTime = Math.max(0, video.currentTime - 5);
  video.play();
}

function toggleVideoFullscreen() {
  const wrap = document.getElementById('video-player-wrap');
  if (!wrap) return;
  if (!document.fullscreenElement) {
    wrap.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}

// Init
loadPersistedState();
render();

function renderAttackers(dist, players, teamSide, mergedData) {
  const listEl = document.getElementById('attacker-list');
  if (!listEl) return;
  // Direcciones: TODOS los ataques del equipo seleccionado
  const allAtks = (mergedData && mergedData.all_attacks)
    ? (Array.isArray(mergedData.all_attacks) ? mergedData.all_attacks : mergedData.all_attacks[teamSide] || [])
    : [];
  // Saques del equipo seleccionado
  const allServes = (mergedData && mergedData.all_serves)
    ? (Array.isArray(mergedData.all_serves) ? mergedData.all_serves : mergedData.all_serves[teamSide] || [])
    : [];

  const byPlayer = {};
  for (const d of allAtks) {
    // Usar player_key (H_03/V_03) si existe, sino player solo
    const pid = d.player_key || d.player;
    if (!byPlayer[pid]) byPlayer[pid]={combos:{},total:0,results:{},rawNum:d.player,serves:{}};
    byPlayer[pid].total++;
    byPlayer[pid].results[d.attack_result]=(byPlayer[pid].results[d.attack_result]||0)+1;
    if (!byPlayer[pid].combos[d.combo]) byPlayer[pid].combos[d.combo]=[];
    byPlayer[pid].combos[d.combo].push(d);
  }

  // Agrupar saques por jugador → por qualifier (SQ/SM)
  for (const s of allServes) {
    const pid = s.player_key || s.player;
    if (!byPlayer[pid]) byPlayer[pid]={combos:{},total:0,results:{},rawNum:s.player,serves:{}};
    const sk = 'S' + (s.qualifier || 'Q'); // 'SQ' o 'SM'
    if (!byPlayer[pid].serves[sk]) byPlayer[pid].serves[sk]=[];
    byPlayer[pid].serves[sk].push(s);
  }

  if (!Object.keys(byPlayer).length) {
    listEl.innerHTML='<p style="color:var(--text-dim);padding:20px">Sin datos</p>'; return;
  }

  const sorted = Object.entries(byPlayer).sort((a,b)=>b[1].total-a[1].total);

  listEl.innerHTML = sorted.map(([pid,info],idx) => {
    // pid es "P_03" — buscar directo en players (clave neutral)
    const rawNum = info.rawNum || pid;
    const p = players[pid] || players['P_' + rawNum];
    const ov       = state.playerOverrides[pid] || {};
    const lastName = ov.lastName  ?? (p ? p.last_name.toUpperCase() : '');
    const firstInit= ov.firstInit ?? (p && p.first_name ? p.first_name.charAt(0).toUpperCase()+'.' : '');
    const number   = ov.number    ?? (p ? p.number : pid);
    const role     = ov.role      ?? (p ? getRoleName(p.role) : '');
    const color    = getPlayerColor(idx);

    const eff  = info.total ? Math.round(((info.results['#']||0)+(info.results['+'||0]))/info.total*100) : 0;
    const pctK = info.total ? Math.round((info.results['#']||0)/info.total*100) : 0;
    const effColor = eff>=50?'#3fb950':eff>=30?'#f0b429':'#f85149';

    const comboCards = Object.entries(info.combos)
      .sort((a,b)=>b[1].length-a[1].length)
      .map(([combo,attacks]) => {
        const gc  = GROUP_COLORS[getComboGroup(combo)]||color;
        const tot = attacks.length;
        const k   = attacks.filter(a=>a.attack_result==='#').length;
        const kp  = attacks.filter(a=>a.attack_result==='+').length;
        const effC= Math.round((k+kp)/tot*100);
        const pctC= Math.round(k/tot*100);
        const effCC=effC>=50?'#3fb950':effC>=30?'#f0b429':'#f85149';
        const svg = renderArrowCourt(combo,attacks,color);
        const cvkey = pid+'_'+combo;
        const cvurl = state.comboVideos[cvkey]||'';
        const comboPlaysId = registerPlays(attacks);
        return `<div class="combo-court-card">
          <div class="combo-court-header">
            <span class="combo-court-label combo-court-label-clickable" style="color:${gc}"
              onclick="playAllDirectly('${comboPlaysId}')" title="Reproducir todas las jugadas de ${combo}">${combo} ▶</span>

          </div>

          <div class="combo-court-stats">
            <div class="ccs-item"><span class="ccs-val" style="color:${effCC}">${effC}%</span><span class="ccs-lbl">EFF</span></div>
            <div class="ccs-item"><span class="ccs-val" style="color:#58a6ff">${tot}</span><span class="ccs-lbl">TOT</span></div>
            <div class="ccs-item"><span class="ccs-val" style="color:#3fb950">${pctC}%</span><span class="ccs-lbl">#%</span></div>
          </div>
          <div class="combo-video-row" onclick="event.stopPropagation()">
            <input class="combo-video-input" placeholder="🔗 Video…"
              value="${escHtml(cvurl)}"
              onchange="saveComboVideo('${pid}','${combo}',this.value)"
              id="cvi-${cvkey}">
            <a id="cvbtn-${cvkey}" href="${escHtml(cvurl)}" target="_blank"
              class="combo-video-btn" style="display:${cvurl?'inline':'none'}">▶</a>
          </div>
        </div>`;
      }).join('');

    // Cards de saque (SQ potencia / SM flotado)
    const SERVE_LABELS = { SQ: 'Saque Potencia', SM: 'Saque Flotado' };
    const serveCards = Object.entries(info.serves || {})
      .sort((a,b)=>b[1].length-a[1].length)

        const tot = serves.length;
        const k   = serves.filter(s=>s.result==='#').length;
        const err = serves.filter(s=>s.result==='=').length;
        const effS= Math.round(k/tot*100);
        const effSColor = effS>=20?'#3fb950':effS>=10?'#f0b429':'#f85149';
        const svg = renderServeCourt(serves, color);
        const svkey = pid+'_'+sk;
        const svurl = state.comboVideos[svkey]||'';
        const servePlaysId = registerPlays(serves);
        return `<div class="combo-court-card">

              onclick="playAllDirectly('${servePlaysId}')" title="Reproducir todos los saques de este tipo">${SERVE_LABELS[sk]||sk} ▶</span>
            <span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--text-dim)">${tot} saq.</span>
          </div>
          <div style="padding:8px 8px 0">${svg}</div>
          <div class="combo-court-stats">
            <div class="ccs-item"><span class="ccs-val" style="color:${effSColor}">${k}</span><span class="ccs-lbl">ACES</span></div>
            <div class="ccs-item"><span class="ccs-val" style="color:#58a6ff">${tot}</span><span class="ccs-lbl">TOT</span></div>
            <div class="ccs-item"><span class="ccs-val" style="color:#f85149">${err}</span><span class="ccs-lbl">ERR</span></div>
          </div>
          <div class="combo-video-row" onclick="event.stopPropagation()">
            <input class="combo-video-input" placeholder="🔗 Video…"
              value="${escHtml(svurl)}"
              onchange="saveComboVideo('${pid}','${sk}',this.value)"
              id="cvi-${svkey}">
            <a id="cvbtn-${svkey}" href="${escHtml(svurl)}" target="_blank"
              class="combo-video-btn" style="display:${svurl?'inline':'none'}">▶</a>
          </div>
        </div>`;
      }).join('');

    const hasServes = Object.keys(info.serves||{}).length > 0;

    // Restaurar foto si existe en override
    const savedPhoto = (state.playerOverrides[pid]||{}).photo;

    return `<div class="player-accordion" id="acc-${pid}" style="--pc:${color}">
      <div class="player-row" onclick="toggleAccordion('${pid}')">
        <div class="player-row-bgnumber" id="bgnumber-${pid}">${number}</div>
        <div class="player-row-left" onclick="event.stopPropagation()">
          <div class="player-circle" onclick="triggerPhotoUpload('${pid}')" title="Clic para agregar foto">
            <img class="player-circle-photo" id="photo-${pid}"
              src="${savedPhoto||''}"
              style="display:${savedPhoto?'block':'none'}" alt="">
            <span class="player-circle-num" id="circnum-${pid}"
              style="display:${savedPhoto?'none':'block'}">${number}</span>
            <div class="player-circle-overlay">📷</div>
          </div>
          <input type="file" class="player-photo-input" id="photo-input-${pid}"
            accept="image/*"
            onchange="loadPlayerPhoto('${pid}', this)">
          <div>
            <div class="player-row-hashtag">#
              <input class="editable-field editable-num" id="ef-num-${pid}"
                value="${number}" style="width:36px;color:${color}"
                onchange="savePlayerOverride('${pid}','number',this.value)"
                onclick="event.stopPropagation()">
            </div>
            <div class="player-row-name">
              <input class="editable-field editable-name" id="ef-ln-${pid}"
                value="${lastName}" placeholder="APELLIDO"
                onchange="savePlayerOverride('${pid}','lastName',this.value)"
                onclick="event.stopPropagation()">
              <input class="editable-field editable-name" id="ef-fi-${pid}"
                value="${firstInit}" placeholder="N."
                style="width:36px"
                onchange="savePlayerOverride('${pid}','firstInit',this.value)"
                onclick="event.stopPropagation()">
            </div>
            <div class="player-row-role">
              <input class="editable-field editable-role" id="ef-role-${pid}"
                value="${role}" placeholder="Posición"
                onchange="savePlayerOverride('${pid}','role',this.value)"
                onclick="event.stopPropagation()">
            </div>
          </div>
        </div>
        <span class="player-row-chevron">▼</span>
      </div>
      <div class="player-accordion-body">
        <div class="skill-tabs">
          <button class="skill-tab active" onclick="switchSkillTab(this,'${pid}','atk')">⚡ Ataque</button>

        <div class="combo-courts-grid" id="panel-atk-${pid}">${comboCards}</div>
